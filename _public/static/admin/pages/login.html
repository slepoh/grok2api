<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login.adminPageTitle">Grok2API - 登录</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Geist Sans', 'sans-serif'] },
          colors: {
            dark: '#000000',
            light: '#ffffff',
            subtle: '#666666',
            border: '#e5e5e5'
          }
        }
      }
    }
  </script>
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/login.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="login-body">
  <div class="login-bg" aria-hidden="true"></div>

  <div class="login-shell">
    <div class="login-card">
      <div class="login-title" data-i18n="login.adminTitle">管理后台</div>
      <div class="login-subtitle" data-i18n="login.adminSubtitle">请输入后台密码以继续</div>

      <div class="login-form">
        <input type="password" id="api-key-input" placeholder="后台密码 (app_key)" data-i18n-placeholder="login.adminPlaceholder" class="geist-input login-input">
        <button onclick="login()" class="geist-button login-button" data-i18n="login.continue">继续</button>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/admin/js/login.js?v=1.6.2"></script>
</body>

</html>
